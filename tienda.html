<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Tienda - El Resolvito</title>
    <meta name="description" content="Compra productos de primera necesidad en La Habana Vieja. Entregas el mismo día.">
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="shortcut icon" href="favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        #loadingOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #2E7D32;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #main-content {
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        #main-content.visible {
            opacity: 1;
        }
        
        .filtro-btn {
            transition: all 0.2s ease;
        }
        .filtro-btn.active {
            background-color: #2E7D32 !important;
            color: white !important;
        }
        
        @media (max-width: 640px) {
            .product-image-container {
                height: 150px;
            }
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cuban-green': '#2E7D32',
                        'cuban-dark': '#1B5E20',
                        'cuban-yellow': '#FFB300',
                        'cuban-blue': '#0277BD',
                        'cuban-orange': '#FF6F00',
                    }
                }
            }
        }
        
        let categoriaActual = 'todos';
        
        function filtrarPorCategoria(categoria) {
            categoriaActual = categoria;
            
            // Actualizar botones
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('bg-gray-200', 'text-gray-700');
                btn.classList.remove('bg-cuban-green', 'text-white');
            });
            const btnActivo = document.getElementById(`filtro-${categoria}`);
            if (btnActivo) {
                btnActivo.classList.remove('bg-gray-200', 'text-gray-700');
                btnActivo.classList.add('bg-cuban-green', 'text-white', 'active');
            }
            
            // Filtrar productos
            const productos = window.PRODUCTS || [];
            let productosFiltrados = [];
            
            if (categoria === 'todos') {
                productosFiltrados = productos;
            } else {
                productosFiltrados = productos.filter(p => p.categoria === categoria);
            }
            
            renderizarProductos(productosFiltrados);
        }
        
        function renderizarProductos(productos) {
            const container = document.getElementById('productos-container');
            if (!container) return;
            
            if (!productos || productos.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">No hay productos en esta categoría</div>';
                return;
            }
            
            container.innerHTML = productos.map(p => {
                const nombreSanitizado = (p.nombre || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const imagenUrl = p.imagen || 'https://placehold.co/300x300/2E7D32/white?text=Producto';
                const precioNum = parseFloat(p.precio) || 0;
                
                return `
                    <div class="product-card bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition group">
                        <div class="product-image-container aspect-square bg-gray-100 cursor-pointer overflow-hidden" onclick="window.openImageModal('${imagenUrl}', '${nombreSanitizado}')">
                            <img src="${imagenUrl}" alt="${p.nombre}" loading="lazy" class="w-full h-full object-contain p-3 transition-transform duration-300 group-hover:scale-105" onerror="this.src='https://placehold.co/300x300/2E7D32/white?text=${encodeURIComponent(p.nombre)}'">
                        </div>
                        <div class="p-4">
                            <h3 class="font-semibold text-gray-800 line-clamp-2 min-h-[48px]">${p.nombre || 'Producto'}</h3>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">${p.descripcion || ''}</p>
                            <div class="flex items-center justify-between mt-3">
                                <span class="text-cuban-green font-bold text-lg">$${precioNum.toLocaleString()}</span>
                                <button onclick="if(window.addToCart) window.addToCart({id:${p.id || Math.random()}, nombre:'${nombreSanitizado}', precio:${precioNum}, imagen:'${imagenUrl}', cantidad:1}); else alert('Cargando carrito...');" class="bg-cuban-green hover:bg-cuban-dark text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition flex items-center gap-1">
                                    <i class="fas fa-cart-plus"></i> Añadir
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderizarCategorias() {
            const productos = window.PRODUCTS || [];
            const categoriasSet = new Set();
            categoriasSet.add('todos');
            productos.forEach(p => {
                if (p.categoria) categoriasSet.add(p.categoria);
            });
            
            const categorias = Array.from(categoriasSet);
            const container = document.getElementById('categorias-container');
            if (!container) return;
            
            container.innerHTML = categorias.map(cat => {
                const nombreMostrar = cat === 'todos' ? '📱 Todos' : cat;
                const isActive = cat === categoriaActual;
                return `
                    <button onclick="filtrarPorCategoria('${cat}')" 
                            id="filtro-${cat}"
                            class="filtro-btn px-4 py-2 rounded-full text-sm font-medium transition ${isActive ? 'bg-cuban-green text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                        ${nombreMostrar}
                    </button>
                `;
            }).join('');
        }
        
        function inicializarTienda() {
            if (window.PRODUCTS && window.PRODUCTS.length > 0) {
                console.log(`✅ ${window.PRODUCTS.length} productos cargados`);
                renderizarCategorias();
                filtrarPorCategoria('todos');
            } else {
                console.log('⏳ Esperando productos...');
                setTimeout(inicializarTienda, 200);
            }
        }
    </script>
</head>
<body>

    <div id="loadingOverlay">
        <div class="loading-spinner mb-4"></div>
        <div class="text-cuban-green font-semibold text-lg">El Resolvito</div>
        <div class="text-gray-400 text-sm mt-2">Cargando productos...</div>
    </div>

    <div id="main-content">
        <div id="pageFade" class="fixed inset-0 bg-white z-[100] opacity-0 transition-opacity duration-200 pointer-events-none"></div>

        <div id="header-container"></div>
        <div id="mobile-menu-container"></div>
        <div id="floating-buttons-container"></div>

        <!-- Hero Tienda -->
        <section class="bg-gradient-to-r from-cuban-green to-cuban-dark text-white py-12">
            <div class="container mx-auto px-4 text-center">
                <h1 class="text-4xl md:text-5xl font-bold mb-3">Nuestra Tienda</h1>
                <p class="text-lg opacity-90">Productos de calidad al mejor precio</p>
            </div>
        </section>

        <!-- Filtros y productos -->
        <section class="py-8">
            <div class="container mx-auto px-4">
                <!-- Categorías -->
                <div class="flex flex-wrap justify-center gap-2 mb-8" id="categorias-container">
                    <div class="text-center py-4 text-gray-500">Cargando categorías...</div>
                </div>
                
                <!-- Grid de productos -->
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6" id="productos-container">
                    <div class="col-span-full text-center py-12 text-gray-500">Cargando productos...</div>
                </div>
            </div>
        </section>

        <!-- Modals and Footer -->
        <div id="image-modal-container"></div>
        <div id="cart-sidebar-container"></div>
        <div id="checkout-modal-container"></div>
        <div id="footer-container"></div>

        <div id="cartToast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-[200] transition-opacity duration-300 opacity-0 pointer-events-none">
            <p id="cartToastMessage"></p>
        </div>
    </div>

    <script src="js/elresolvito.js" defer></script>
    
    <script>
        // Cargar componentes
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (error) {
                console.error(`Error cargando ${path}:`, error);
            }
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('Inicializando tienda...');

            await loadComponent('header-container', 'components/header.html');
            await loadComponent('mobile-menu-container', 'components/mobile-menu.html');
            await loadComponent('floating-buttons-container', 'components/floating-buttons.html');
            await loadComponent('image-modal-container', 'components/image-modal.html');
            await loadComponent('cart-sidebar-container', 'components/cart-sidebar.html');
            await loadComponent('checkout-modal-container', 'components/checkout-modal.html');
            await loadComponent('footer-container', 'components/footer.html');

            // Esperar a que los productos estén disponibles
            const esperarProductos = setInterval(() => {
                if (window.PRODUCTS && window.PRODUCTS.length > 0) {
                    clearInterval(esperarProductos);
                    console.log(`✅ ${window.PRODUCTS.length} productos cargados en tienda`);
                    renderizarCategorias();
                    filtrarPorCategoria('todos');
                    
                    // Ocultar loading
                    const overlay = document.getElementById('loadingOverlay');
                    const mainContent = document.getElementById('main-content');
                    if (overlay) {
                        overlay.classList.add('hidden');
                        setTimeout(() => overlay.style.display = 'none', 500);
                    }
                    if (mainContent) mainContent.classList.add('visible');
                }
            }, 100);
            
            // Timeout por si algo falla
            setTimeout(() => {
                clearInterval(esperarProductos);
                const overlay = document.getElementById('loadingOverlay');
                const mainContent = document.getElementById('main-content');
                if (overlay && !overlay.classList.contains('hidden')) {
                    overlay.classList.add('hidden');
                    setTimeout(() => overlay.style.display = 'none', 500);
                }
                if (mainContent) mainContent.classList.add('visible');
                
                if (!window.PRODUCTS || window.PRODUCTS.length === 0) {
                    const container = document.getElementById('productos-container');
                    if (container) {
                        container.innerHTML = '<div class="col-span-full text-center py-12 text-red-500">Error al cargar productos. Recarga la página.</div>';
                    }
                }
            }, 8000);

            if (typeof window.updateCartUI === 'function') {
                window.updateCartUI();
            }
        });
        
        // Función para que los botones de filtro funcionen después de cargar
        window.filtrarPorCategoria = filtrarPorCategoria;
    </script>
</body>
</html>
