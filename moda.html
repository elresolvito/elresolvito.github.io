    <style>
        .producto-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .producto-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2);
        }

        .producto-imagen {
            aspect-ratio: 1 / 1;
            width: 100%;
            overflow: hidden;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            cursor: pointer;
        }

        .producto-imagen img {
            width: auto;
            height: auto;
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .producto-card:hover .producto-imagen img {
            transform: scale(1.08);
        }

        .producto-info {
            padding: 1.25rem;
            background: white;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .producto-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.25rem;
        }

        .producto-info p {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 0.75rem;
        }

        .producto-precio {
            margin-bottom: 1rem;
        }

        .precio {
            font-size: 1.3rem;
            font-weight: 800;
            color: #2E7D32;
        }

        .precio-usd {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6b7280;
            margin-left: 0.25rem;
        }

        .producto-wa {
            width: 100%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: auto;
        }

        .producto-wa:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(37,211,102,0.4);
        }

        .badge-nuevo {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background: linear-gradient(135deg, #FF69B4, #9B59B6);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            z-index: 10;
        }

        .badge-oferta {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: linear-gradient(135deg, #FF6F00, #FFB300);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            z-index: 10;
        }

        .hero-moda {
            background: linear-gradient(135deg, #FF69B4 0%, #9B59B6 50%, #3498DB 100%);
            min-height: 50vh;
            display: flex;
            align-items: center;
        }

        .filtro-btn {
            transition: all 0.3s ease;
        }
        .filtro-btn:hover {
            transform: translateY(-2px);
        }
        .filtro-activo {
            background-color: #2E7D32 !important;
            color: white !important;
        }

        @media (max-width: 640px) {
            .producto-imagen {
                padding: 1rem;
            }
            .precio {
                font-size: 1.1rem;
            }
        }
    </style>

        // Función para abrir modal de imagen
        function abrirModal(imagen, titulo, descripcion, precio) {
            const modalHTML = `
                <div class="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4" onclick="this.remove()">
                    <div class="bg-white rounded-2xl max-w-2xl w-full" onclick="event.stopPropagation()">
                        <img src="${imagen}" class="w-full h-96 object-contain bg-gray-100 p-4 rounded-t-2xl">
                        <div class="p-6">
                            <h3 class="text-2xl font-bold mb-2">${titulo}</h3>
                            <p class="text-gray-600 mb-4">${descripcion}</p>
                            <p class="text-3xl font-bold text-cuban-green mb-4">$${precio} USD</p>
                            <button onclick="if(window.addToCart) window.addToCart({id: Math.random(), nombre: '${titulo}', precio: ${precio * 24}, imagen: '${imagen}', cantidad: 1}); this.closest('.fixed').remove();" class="w-full bg-cuban-green text-white py-3 rounded-xl font-bold hover:bg-cuban-dark transition">
                                <i class="fas fa-cart-plus mr-2"></i>Agregar al carrito
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        // Renderizar productos
        function renderizarProductos() {
            // Calzados
            const calzadosGrid = document.getElementById('calzados-grid');
            if (calzadosGrid) {
                calzadosGrid.innerHTML = productosModa.calzados.map(p => `
                    <div class="producto-card relative">
                        <div class="badge-nuevo">✨ Nuevo</div>
                        <div class="producto-imagen" onclick="abrirModal('${p.imagen}', '${p.nombre}', '${p.descripcion}', ${p.precio})">
                            <img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.src='https://placehold.co/400x400/3498DB/white?text=Calzado'">
                        </div>
                        <div class="producto-info">
                            <h3>${p.nombre}</h3>
                            <p>${p.descripcion}</p>
                            <div class="producto-precio">
                                <span class="precio">$${p.precio}</span>
                                <span class="precio-usd">USD</span>
                            </div>
                            <button class="producto-wa" onclick="if(window.addToCart) window.addToCart({id: ${p.id}, nombre: '${p.nombre}', precio: ${p.precio * 24}, imagen: '${p.imagen}', cantidad: 1})">
                                <i class="fas fa-cart-plus"></i> Agregar al carrito
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            // Carteras
            const carterasGrid = document.getElementById('carteras-grid');
            if (carterasGrid) {
                carterasGrid.innerHTML = productosModa.carteras.map(p => `
                    <div class="producto-card relative">
                        <div class="badge-nuevo">✨ Exclusiva</div>
                        <div class="producto-imagen" onclick="abrirModal('${p.imagen}', '${p.nombre}', '${p.descripcion}', ${p.precio})">
                            <img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.src='https://placehold.co/400x400/9B59B6/white?text=Cartera'">
                        </div>
                        <div class="producto-info">
                            <h3>${p.nombre}</h3>
                            <p>${p.descripcion}</p>
                            <div class="producto-precio">
                                <span class="precio">$${p.precio}</span>
                                <span class="precio-usd">USD</span>
                            </div>
                            <button class="producto-wa" onclick="if(window.addToCart) window.addToCart({id: ${p.id}, nombre: '${p.nombre}', precio: ${p.precio * 24}, imagen: '${p.imagen}', cantidad: 1})">
                                <i class="fas fa-cart-plus"></i> Agregar al carrito
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            // Ropa
            const ropaGrid = document.getElementById('ropa-grid');
            if (ropaGrid) {
                ropaGrid.innerHTML = productosModa.ropa.map(p => `
                    <div class="producto-card relative">
                        <div class="badge-nuevo">✨ Nuevo</div>
                        <div class="producto-imagen" onclick="abrirModal('${p.imagen}', '${p.nombre}', '${p.descripcion}', ${p.precio})">
                            <img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.src='https://placehold.co/400x400/FF69B4/white?text=Ropa'">
                        </div>
                        <div class="producto-info">
                            <h3>${p.nombre}</h3>
                            <p>${p.descripcion}</p>
                            <div class="producto-precio">
                                <span class="precio">$${p.precio}</span>
                                <span class="precio-usd">USD</span>
                            </div>
                            <button class="producto-wa" onclick="if(window.addToCart) window.addToCart({id: ${p.id}, nombre: '${p.nombre}', precio: ${p.precio * 24}, imagen: '${p.imagen}', cantidad: 1})">
                                <i class="fas fa-cart-plus"></i> Agregar al carrito
                            </button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Función para filtrar por categoría
        let categoriaActual = 'todos';
        
        function mostrarCategoria(categoria) {
            categoriaActual = categoria;
            
            // Actualizar estilos de los botones
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('bg-cuban-green', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            const btnActivo = document.getElementById(`filtro-${categoria}`);
            if (btnActivo) {
                btnActivo.classList.remove('bg-gray-200', 'text-gray-700');
                btnActivo.classList.add('bg-cuban-green', 'text-white');
            }
            
            // Mostrar/ocultar secciones
            const secciones = document.querySelectorAll('.categoria-section');
            secciones.forEach(seccion => {
                if (categoria === 'todos') {
                    seccion.style.display = 'block';
                } else {
                    const id = seccion.id;
                    if ((categoria === 'calzados' && id === 'calzados-section') ||
                        (categoria === 'carteras' && id === 'carteras-section') ||
                        (categoria === 'ropa' && id === 'ropa-section')) {
                        seccion.style.display = 'block';
                    } else {
                        seccion.style.display = 'none';
                    }
                }
            });
        }

        // Cargar componentes
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (error) {
                console.error(`Error cargando ${path}:`, error);
            }
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', async function() {
            await loadComponent('header-container', 'components/header.html');
            await loadComponent('mobile-menu-container', 'components/mobile-menu.html');
            await loadComponent('floating-buttons-container', 'components/floating-buttons.html');
            await loadComponent('image-modal-container', 'components/image-modal.html');
            await loadComponent('cart-sidebar-container', 'components/cart-sidebar.html');
            await loadComponent('checkout-modal-container', 'components/checkout-modal.html');
            await loadComponent('footer-container', 'components/footer.html');
            
            renderizarProductos();
            mostrarCategoria('todos');

            if (typeof window.updateCartUI === 'function') {
                window.updateCartUI();
            }
            
            setTimeout(() => {
                if (typeof window.addToCart === 'function') {
                    console.log('✅ Carrito funcionando en Moda');
                } else {
                    console.warn('⚠️ addToCart no disponible en Moda');
                }
            }, 500);
        });
    </script>
</body>
</html>
