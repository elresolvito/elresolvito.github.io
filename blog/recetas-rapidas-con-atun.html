        tailwind.config = {
            theme: {

                    fontFamily: { 'poppins': ['Poppins'], 'opensans': ['Open Sans'] },

                        'cuban-green': '#2E7D32', 'cuban-dark': '#1B5E20',

                }
            }
        }
    </script>

    <style>
        @media (max-width: 640px) {

<body class="bg-white text-gray-800">
    <div id="pageFade" class="fixed inset-0 bg-white z-[100] opacity-0 transition-opacity duration-200 pointer-events-none"></div>

    <!-- Contenedores para componentes (rutas correctas: subir un nivel) -->
    <div id="header-container"></div>
    <div id="mobile-menu-container"></div>
    <div id="floating-buttons-container"></div>

    <!-- Contenido del artículo -->
    <section class="py-12 bg-gray-50">
        <div class="container mx-auto px-4 max-w-3xl">
            <!-- Cabecera -->
            <div class="mb-8">
                <a href="../blog.html" class="text-cuban-green hover:underline mb-4 inline-block">
                    <i class="fas fa-arrow-left mr-2"></i>Volver al Blog
                </a>
                <!-- ... resto del contenido ... -->
            </div>
        </div>
    </section>

    <!-- Contenedores para modales y footer -->
    <div id="image-modal-container"></div>
    <div id="cart-sidebar-container"></div>
    <div id="checkout-modal-container"></div>
    <div id="footer-container"></div>

    <!-- Toast -->
    <div id="cartToast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-[200] transition-opacity duration-300 opacity-0 pointer-events-none"></div>

    <!-- Script principal (ruta correcta) -->
    <script src="../js/elresolvito.js" defer></script>

    <!-- Script de carga de componentes -->
    <script>
        async function loadComponent(e, p) {
            try {
                const r = await fetch(p);
                document.getElementById(e).innerHTML = await r.text();
            } catch (error) { console.error(error); }
        }
        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('header-container', '../components/header.html');
            await loadComponent('mobile-menu-container', '../components/mobile-menu.html');
            await loadComponent('floating-buttons-container', '../components/floating-buttons.html');
            await loadComponent('image-modal-container', '../components/image-modal.html');
            await loadComponent('cart-sidebar-container', '../components/cart-sidebar.html');
            await loadComponent('checkout-modal-container', '../components/checkout-modal.html');
            await loadComponent('footer-container', '../components/footer.html');
        });

        // Funciones de comentarios
        function enviarComentario(id) {
            const n = document.getElementById(`comentario-nombre-${id}`)?.value;
            const c = document.getElementById(`comentario-texto-${id}`)?.value;
            if (!n || !c) return alert('Completa todos los campos');
            const t = document.querySelector('h1')?.textContent || 'Artículo';
            window.open(`https://wa.me/5356382909?text=${encodeURIComponent(`*Nuevo comentario*\n\n${t}\n${n}: ${c}`)}`,'_blank');
        }
        function enviarReaccion(t, a) {
            const titulo = document.querySelector('h1')?.textContent || 'Artículo';
            const msg = t === 'me-gusta' 
                ? `❤️ Me gusta el comentario de ${a} en "${titulo}"`
                : `💬 Quiero responder a ${a} en "${titulo}"`;
            window.open(`https://wa.me/5356382909?text=${encodeURIComponent(msg)}`,'_blank');
        }
    </script>
</body>
</html>
