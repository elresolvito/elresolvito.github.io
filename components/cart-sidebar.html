<!-- components/cart-sidebar.html -->
<div id="cartOverlay" class="fixed inset-0 bg-black/50 z-[9999] hidden" onclick="window.toggleCart()"></div>

<div id="cartSidebar" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-2xl z-[10000] max-h-[85vh] flex flex-col" style="transform: translateY(100%);">
    
    <!-- Cabecera más atractiva -->
    <div class="p-5 bg-gradient-to-r from-cuban-green to-cuban-dark text-white rounded-t-3xl">
        <div class="flex justify-between items-center">
            <h3 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-shopping-cart"></i> Tu Carrito
                <span id="cartCount" class="bg-cuban-yellow text-cuban-dark text-sm px-2 py-0.5 rounded-full hidden">0</span>
            </h3>
            <button onclick="window.toggleCart()" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <p class="text-sm opacity-90 mt-1">Revisa tus productos antes de finalizar</p>
    </div>
    
    <!-- Lista de productos -->
    <div id="cartItems" class="flex-1 overflow-y-auto p-5 space-y-3 bg-gray-50">
        <!-- Los items se cargan dinámicamente -->
    </div>
    
    <!-- Resumen y botón de checkout -->
    <div class="p-5 bg-white border-t border-gray-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="space-y-3 mb-5">
            <!-- Subtotal -->
            <div class="flex justify-between items-center text-base">
                <span class="text-gray-600">Subtotal:</span>
                <span id="cartSubtotal" class="font-bold text-gray-800">$0</span>
            </div>
            
            <!-- Envío (se muestra según selección) -->
            <div class="flex justify-between items-center text-base border-t border-gray-100 pt-2">
                <span class="text-gray-600">Envío:</span>
                <span id="cartShipping" class="text-gray-600">A calcular en checkout</span>
            </div>
            
            <!-- Total -->
            <div class="flex justify-between items-center text-lg font-bold border-t border-gray-200 pt-3">
                <span>Total:</span>
                <span id="cartTotal" class="text-cuban-green">$0</span>
            </div>
        </div>
        
        <!-- Botón de checkout mejorado -->
        <button onclick="window.openCheckoutModal()" 
                class="w-full bg-gradient-to-r from-green-600 to-green-700 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-3 hover:opacity-90 transition shadow-md text-lg">
            <i class="fab fa-whatsapp text-xl"></i>
            Proceder al checkout
        </button>
        
        <!-- Mensaje de seguridad -->
        <p class="text-xs text-center text-gray-500 mt-4 flex items-center justify-center gap-1">
            <i class="fas fa-lock text-cuban-green"></i> 
            Pedido seguro por WhatsApp al 5356382909
        </p>
    </div>
</div>
