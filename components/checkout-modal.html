<!-- components/checkout-modal.html -->
<div id="checkoutModal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 99999; display: none; align-items: center; justify-content: center; padding: 1rem;">
    <div style="background: white; border-radius: 1.5rem; max-width: 28rem; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
        
        <!-- Cabecera -->
        <div style="padding: 1.5rem; background: linear-gradient(135deg, #2E7D32, #1B5E20); color: white; border-radius: 1.5rem 1.5rem 0 0;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="font-size: 1.5rem; font-weight: bold; margin: 0;">
                        <i class="fas fa-clipboard-list"></i> Finalizar pedido
                    </h3>
                    <p style="font-size: 0.875rem; opacity: 0.9; margin-top: 0.25rem;">Completa los datos y te contactamos</p>
                </div>
                <button onclick="window.closeCheckoutModal()" style="width: 2.5rem; height: 2.5rem; background: rgba(255,255,255,0.2); border: none; border-radius: 9999px; cursor: pointer; color: white;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <div style="padding: 1.5rem; background: white;">
            <form id="checkoutForm">
                
                <!-- Resumen del carrito -->
                <div style="margin-bottom: 1.5rem; padding: 1rem; background: #f9fafb; border-radius: 0.75rem; border: 1px solid #e5e7eb;">
                    <p style="font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #1f2937;">
                        <i class="fas fa-shopping-cart" style="color: #2E7D32;"></i> Tu pedido:
                    </p>
                    <div id="checkoutCartSummary" style="font-size: 0.875rem; color: #4b5563;"></div>
                    <div style="display: flex; justify-content: space-between; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #e5e7eb;">
                        <span style="font-weight: bold;">Total:</span>
                        <span id="checkoutTotal" style="font-weight: bold; color: #2E7D32;">$0</span>
                    </div>
                </div>

                <!-- Nombre -->
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem;">Nombre completo *</label>
                    <input type="text" id="customerName" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; background: white; color: #1f2937;">
                </div>

                <!-- Dirección -->
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem;">Dirección completa *</label>
                    <textarea id="customerAddress" rows="2" required style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; background: white; color: #1f2937;"></textarea>
                </div>

                <!-- Notas -->
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem;">Notas adicionales</label>
                    <textarea id="customerNotes" rows="2" style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; background: white; color: #1f2937;"></textarea>
                </div>

                <!-- Botones -->
                <div style="display: flex; gap: 0.75rem;">
                    <button type="button" onclick="window.closeCheckoutModal()" style="flex: 1; padding: 0.75rem; border: 2px solid #d1d5db; background: white; color: #4b5563; border-radius: 0.75rem; font-weight: bold; cursor: pointer;">
                        Cancelar
                    </button>
                    <button type="button" onclick="window.sendCompleteOrder()" style="flex: 1; padding: 0.75rem; background: linear-gradient(135deg, #16a34a, #15803d); color: white; border: none; border-radius: 0.75rem; font-weight: bold; cursor: pointer;">
                        <i class="fab fa-whatsapp"></i> Enviar pedido
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Función para abrir el modal
    window.openCheckoutModal = function() {
        var modal = document.getElementById('checkoutModal');
        if (!modal) {
            console.error('Modal no encontrado');
            return;
        }
        
        // Actualizar resumen del carrito
        if (window.cart && window.cart.length > 0) {
            var summaryDiv = document.getElementById('checkoutCartSummary');
            var totalSpan = document.getElementById('checkoutTotal');
            var total = 0;
            
            if (summaryDiv) {
                summaryDiv.innerHTML = '';
                for (var i = 0; i < window.cart.length; i++) {
                    var item = window.cart[i];
                    var itemTotal = item.precio * item.cantidad;
                    total += itemTotal;
                    summaryDiv.innerHTML += '<div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;"><span>' + item.nombre + ' x' + item.cantidad + '</span><span>$' + itemTotal.toLocaleString() + '</span></div>';
                }
            }
            if (totalSpan) {
                totalSpan.innerHTML = '$' + total.toLocaleString();
            }
        } else {
            document.getElementById('checkoutCartSummary').innerHTML = '<p style="color: #ef4444;">Carrito vacío</p>';
            document.getElementById('checkoutTotal').innerHTML = '$0';
        }
        
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    };
    
    // Función para cerrar el modal
    window.closeCheckoutModal = function() {
        var modal = document.getElementById('checkoutModal');
        if (modal) {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
    };
    
    // Función para enviar el pedido
    window.sendCompleteOrder = function() {
        var nombre = document.getElementById('customerName').value.trim();
        var direccion = document.getElementById('customerAddress').value.trim();
        var notas = document.getElementById('customerNotes').value.trim();
        
        if (!nombre) {
            alert('⚠️ Por favor, ingresa tu nombre completo.');
            return;
        }
        if (!direccion) {
            alert('⚠️ Por favor, ingresa tu dirección completa.');
            return;
        }
        if (!window.cart || window.cart.length === 0) {
            alert('⚠️ Tu carrito está vacío.');
            return;
        }
        
        // Calcular total
        var total = 0;
        var productosTexto = '';
        for (var i = 0; i < window.cart.length; i++) {
            var item = window.cart[i];
            var itemTotal = item.precio * item.cantidad;
            total += itemTotal;
            productosTexto += '• ' + item.nombre + ' x' + item.cantidad + ' = $' + itemTotal.toLocaleString() + '\n';
        }
        
        // Construir mensaje
        var mensaje = '🛒 *NUEVO PEDIDO - EL RESOLVITO* 🛒\n\n';
        mensaje += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        mensaje += '👤 *DATOS DEL CLIENTE*\n';
        mensaje += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        mensaje += '• *Nombre:* ' + nombre + '\n';
        mensaje += '• *Dirección:* ' + direccion + '\n\n';
        
        mensaje += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        mensaje += '🛍️ *PRODUCTOS SOLICITADOS*\n';
        mensaje += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        mensaje += productosTexto;
        
        mensaje += '\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        mensaje += '💰 *TOTAL:* $' + total.toLocaleString() + '\n';
        mensaje += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        
        if (notas) {
            mensaje += '\n📝 *NOTAS:* ' + notas + '\n';
        }
        
        mensaje += '\n🚚 *ENTREGA:* La Habana Vieja (tarifa fija hasta 8kg). Para otros municipios, te contactamos.\n\n';
        mensaje += '¡Gracias por tu compra! 🙏';
        
        // Abrir WhatsApp
        window.open('https://wa.me/5356382909?text=' + encodeURIComponent(mensaje), '_blank');
        
        // Limpiar carrito
        if (window.cart) {
            window.cart = [];
            localStorage.removeItem('elresolvito_cart');
            if (typeof window.updateCartUI === 'function') {
                window.updateCartUI();
            }
        }
        
        // Cerrar modal
        window.closeCheckoutModal();
        
        // Limpiar formulario
        document.getElementById('customerName').value = '';
        document.getElementById('customerAddress').value = '';
        document.getElementById('customerNotes').value = '';
    };
    
    // Cerrar al hacer clic fuera
    document.addEventListener('click', function(event) {
        var modal = document.getElementById('checkoutModal');
        if (modal && modal.style.display === 'flex' && event.target === modal) {
            window.closeCheckoutModal();
        }
    });
</script>
