<!-- components/header.html -->
<header class="bg-white shadow-sm">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16 md:h-20">
            <!-- Logo con imagen real -->
            <a href="index.html" class="flex items-center gap-2">
                <img src="https://i.postimg.cc/s2FHrX2Y/logo_el_resolvito.jpg" 
                     alt="El Resolvito" 
                     class="h-10 w-auto rounded-full">
                <span class="font-bold text-xl text-gray-800 hidden sm:inline">El Resolvito</span>
            </a>
            
            <!-- Navegación desktop (igual) -->
            <nav class="hidden md:flex items-center space-x-6">
                <a href="index.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Inicio</a>
                <a href="tienda.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Tienda</a>
                <a href="servicios.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Servicios</a>
                <a href="ofertas.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Ofertas</a>
                <a href="blog.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Blog</a>
                <a href="reservas.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Alojamientos</a>
                <a href="quienes-somos.html" class="text-gray-600 hover:text-cuban-green transition font-medium">Quiénes Somos</a>
            </nav>
            
            <!-- Acciones (igual) -->
            <div class="flex items-center gap-2">
                <button onclick="window.toggleDayNight()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition">
                    <span id="headerThemeIcon">☀️</span>
                </button>
                <a href="tienda.html" class="relative w-10 h-10 bg-cuban-green rounded-full flex items-center justify-center text-white hover:bg-cuban-dark transition">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="headerCartCount" class="cart-badge hidden">0</span>
                </a>
                <button onclick="window.toggleMenu()" class="md:hidden w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition">
                    <i class="fas fa-bars text-gray-600"></i>
                </button>
            </div>
        </div>
